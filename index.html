<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PHuN Poster AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- A-Frame & MindAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>
  <a-scene mindar-image="imageTargetSrc: ./markers/targets.mind;"
           color-space="sRGB"
           renderer="colorManagement: true, physicallyCorrectLights"
           vr-mode-ui="enabled: false"
           device-orientation-permission-ui="enabled: false">

    <!-- Assets -->
    <a-assets>
      <!-- Video assets (replace paths with your files) -->
      <video id="video1" src="./movies/video1.mp4" loop muted playsinline crossorigin="anonymous"></video>
      <video id="video2" src="./movies/video2.mp4" loop muted playsinline crossorigin="anonymous"></video>
      <video id="video3" src="./movies/video3.mp4" loop muted playsinline crossorigin="anonymous"></video>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Marker 1 -->
    <a-entity mindar-image-target="targetIndex: 0" id="target1">
      <a-video src="#video1" width="2" height="1.124" position="0 0 0" rotation="0 0 0"
               autoplay loop muted playsinline></a-video>
    </a-entity>

    <!-- Marker 2 -->
    <a-entity mindar-image-target="targetIndex: 1" id="target2">
      <a-video src="#video2" width="2" height="1.124" position="0 0 0" rotation="0 0 0"
               autoplay loop muted playsinline></a-video>
    </a-entity>

    <!-- Marker 3 -->
    <a-entity mindar-image-target="targetIndex: 2" id="target3">
      <a-video src="#video3" width="2" height="1.124" position="0 0 0" rotation="0 0 0"
               autoplay loop muted playsinline></a-video>
    </a-entity>

  </a-scene>

  <!-- Script for automatic video playback on target detection -->
  <script>
    const videos = [
      document.querySelector("#video1"),
      document.querySelector("#video2"),
      document.querySelector("#video3")
    ];

    const targets = [
      document.querySelector("#target1"),
      document.querySelector("#target2"),
      document.querySelector("#target3")
    ];

    // Ensure videos are muted and playsInline for mobile autoplay
    videos.forEach(v => {
      v.muted = true;
      v.playsInline = true;
    });

    // Play/pause videos automatically on target detection
    targets.forEach((t, index) => {
      const vid = videos[index];
      t.addEventListener("targetFound", () => {
        vid.play().catch(err => console.log("Video play failed on targetFound:", err));
      });
      t.addEventListener("targetLost", () => {
        vid.pause();
      });
    });
  </script>
</body>
</html>
